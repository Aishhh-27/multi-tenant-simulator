apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-app
  template:
    metadata:
      labels:
        app: tenant-app
    spec:
      containers:
      - name: tenant-app
        image: tenant-app:v1
        ports:
        - containerPort: 5000
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
    requests:
        cpu: "200m"
        memory: "128Mi"
